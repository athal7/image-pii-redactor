name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # links to the npm trusted publisher config
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing — no NPM_TOKEN needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install

      - run: npm test

      - run: npm run build

      # Publishes using OIDC (no NPM_TOKEN secret required).
      # npm verifies the GitHub Actions OIDC token and grants publish rights
      # based on the trusted publisher config set up on npmjs.com.
      - run: npm publish --provenance --access public
